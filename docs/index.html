<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Osler Capture Diagnostics — página simulada</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 840px; line-height: 1.55; }
      main { border: 1px solid #ddd; border-radius: 16px; padding: 1.5rem; }
      .osler-card-explanation { background: #f6f8fa; border-radius: 12px; padding: 1rem; }
      .actions { display: flex; gap: .75rem; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <main>
      <div>
        <p><strong>Fisiologia Renal.</strong> O rim impede acidose ao <span class="cloze-answer">reter HCO<sub>3</sub><sup>–</sup></span> e eliminar <span class="cloze-answer">ácidos</span>.</p>
        <div class="osler-card-explanation">
          <p><em>Parece óbvio, mas “ácidos” não significa apenas H<sup>+</sup> livre.</em></p>
          <p><em>O rim recupera bicarbonato filtrado e excreta ácido titulável.</em></p>
          <p><em>A amoniagênese também permite eliminar carga ácida.</em></p>
        </div>
      </div>
      <div class="actions">
        <button type="button">Errei</button>
        <button type="button">Difícil</button>
        <button type="button">Acertei</button>
      </div>
    </main>
    <script src="./osler-anki-bridge.user.js"></script>
  </body>
</html>
