<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Osler Capture Diagnostics — página simulada</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 840px; line-height: 1.55; }
      main { border: 1px solid #ddd; border-radius: 16px; padding: 1.5rem; }
      .answer-block, .osler-card-explanation { background: #f6f8fa; border-radius: 12px; padding: 1rem; margin-top: 1rem; }
      .actions { display: flex; gap: .75rem; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <main>
      <div>
        <p><strong>Aloimunização Rh.</strong> O sangramento fetomaternal está associado a situações como:</p>
        <ul class="answer-block">
          <li>Amniocentese</li>
          <li>Trauma abdominal</li>
          <li>Parto</li>
        </ul>
        <div class="osler-card-explanation">
          <p><em>Atenção aqui!</em></p>
          <p><em>O sangramento fetomaternal transplacentário ocorre em pequenas quantidades em muitas gestações.</em></p>
          <p><em>As situações listadas são associações clássicas.</em></p>
        </div>
      </div>
      <div class="actions">
        <button type="button">Errei</button>
        <button type="button">Difícil</button>
        <button type="button">Acertei</button>
      </div>
    </main>
    <script src="./osler-anki-bridge.user.js"></script>
  </body>
</html>
